<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintxo Design System - Rama Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-700">
            <h1 class="text-2xl font-bold mb-2 text-center text-orange-500">Pintxo DS Dashboard</h1>
            <p class="text-slate-400 text-sm mb-6 text-center">Introduce tus credenciales de Figma. Se guardarán de forma local y segura en tu navegador.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Figma Personal Access Token</label>
                    <input type="password" id="figma-token" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-orange-500 transition" placeholder="figd_...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Project ID</label>
                    <input type="text" id="project-id" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-orange-500 transition" placeholder="Ej: 326749193">
                </div>
                <button onclick="saveConfig()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-medium py-2.5 rounded-lg transition mt-2 shadow-lg shadow-orange-900/20">
                    Conectar con Figma
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-xl font-bold tracking-tight text-white">Pintxo <span class="text-orange-500">Design System</span></span>
                    <span class="bg-slate-900 text-xs text-slate-400 px-2.5 py-1 rounded-full border border-slate-700 font-mono" id="project-title-tag">Cargando...</span>
                </div>
                <button onclick="disconnect()" class="text-sm text-slate-400 hover:text-white transition">
                    Cerrar Sesión
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-sm font-medium text-slate-400 uppercase tracking-wider">Archivos en Proyecto</p>
                    <p class="text-3xl font-bold mt-2" id="kpi-files">0</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-sm font-medium text-slate-400 uppercase tracking-wider">Ramas Abiertas</p>
                    <p class="text-3xl font-bold mt-2 text-orange-500" id="kpi-branches">0</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-sm font-medium text-slate-400 uppercase tracking-wider">Ramas Inactivas (+90 días)</p>
                    <p class="text-3xl font-bold mt-2 text-rose-500" id="kpi-stale">0</p>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
                <div class="w-full sm:w-72">
                    <input type="text" id="search-input" oninput="renderDashboard()" placeholder="Buscar rama por nombre..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                </div>
                <div class="w-full sm:w-64">
                    <select id="file-filter" onchange="renderDashboard()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-orange-500">
                        <option value="all">Todos los archivos origen</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900/50 border-b border-slate-700 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                <th class="px-6 py-4">Nombre de la Rama</th>
                                <th class="px-6 py-4">Archivo Origen</th>
                                <th class="px-6 py-4">Última Modificación</th>
                                <th class="px-6 py-4 text-right">Acción</th>
                            </tr>
                        </table>
                    </div>
                    <div id="branches-container" class="divide-y divide-slate-700">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let figmaData = null;

        // Comprobar si ya hay credenciales guardadas al cargar la página
        window.onload = function() {
            const token = sessionStorage.getItem('figma_token');
            const projectId = sessionStorage.getItem('figma_project_id');
            if (token && projectId) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                fetchFigmaData(token, projectId);
            }
        }

        function saveConfig() {
            const token = document.getElementById('figma-token').value.trim();
            const projectId = document.getElementById('project-id').value.trim();

            if (!token || !projectId) {
                alert('Por favor, rellena ambos campos.');
                return;
            }

            sessionStorage.setItem('figma_token', token);
            sessionStorage.setItem('figma_project_id', projectId);

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            fetchFigmaData(token, projectId);
        }

        function disconnect() {
            sessionStorage.clear();
            window.location.reload();
        }

        // Petición real en tiempo real a la API de Figma
        async function fetchFigmaData(token, projectId) {
            try {
                const response = await fetch(`https://api.figma.com/v1/projects/${projectId}/files?branch_data=true`, {
                    headers: { 'X-Figma-Token': token }
                });

                if (!response.ok) throw new Error('Error al conectar con Figma. Verifica el token o el ID del proyecto.');

                figmaData = await response.json();
                
                // Rellenar el filtro de archivos dinámicamente
                const filterSelect = document.getElementById('file-filter');
                document.getElementById('project-title-tag').innerText = figmaData.name || 'Proyecto';
                
                figmaData.files.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file.key;
                    option.innerText = file.name;
                    filterSelect.appendChild(option);
                });

                renderDashboard();
            } catch (error) {
                alert(error.message);
                disconnect();
            }
        }

        function renderDashboard() {
            if (!figmaData) return;

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const fileFilter = document.getElementById('file-filter').value;
            const container = document.getElementById('branches-container');
            container.innerHTML = '';

            let totalFiles = figmaData.files.length;
            let totalBranches = 0;
            let staleBranches = 0;
            let branchesToRender = [];

            const ahora = new Date();

            figmaData.files.forEach(file => {
                // Filtrar por archivo si corresponde
                if (fileFilter !== 'all' && file.key !== fileFilter) return;

                if (file.branches && file.branches.length > 0) {
                    file.branches.forEach(branch => {
                        totalBranches++;
                        
                        // Calcular si es obsoleta (más de 90 días sin modificar)
                        const fechaMod = new Date(branch.last_modified);
                        const diasInactiva = (ahora - fechaMod) / (1000 * 60 * 60 * 24);
                        const isStale = diasInactiva > 90;
                        
                        if (isStale) staleBranches++;

                        // Filtrar por buscador de texto
                        if (branch.name.toLowerCase().includes(searchTerm)) {
                            branchesToRender.push({
                                ...branch,
                                originFileName: file.name,
                                isStale: isStale
                            });
                        }
                    });
                }
            });

            // Actualizar KPIs en la interfaz
            document.getElementById('kpi-files').innerText = totalFiles;
            document.getElementById('kpi-branches').innerText = totalBranches;
            document.getElementById('kpi-stale').innerText = staleBranches;

            if (branchesToRender.length === 0) {
                container.innerHTML = `<div class="px-6 py-8 text-center text-slate-500 text-sm">No se encontraron ramas abiertas que coincidan.</div>`;
                return;
            }

            // Renderizar la lista ordenando por fecha de modificación más reciente
            branchesToRender.sort((a, b) => new Date(b.last_modified) - new Date(a.last_modified));

            branchesToRender.forEach(branch => {
                const fecha = new Date(branch.last_modified).toLocaleDateString('es-ES', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'
                });

                const row = document.createElement('div');
                row.className = `flex flex-col sm:flex-row sm:items-center justify-between px-6 py-4 hover:bg-slate-700/30 transition ${branch.isStale ? 'bg-rose-950/10 border-l-2 border-rose-500' : ''}`;
                
                row.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center space-x-2">
                            <span class="text-sm font-semibold text-white truncate">${branch.name}</span>
                            ${branch.isStale ? '<span class="bg-rose-500/10 border border-rose-500/30 text-rose-400 text-[10px] px-2 py-0.5 rounded font-medium tracking-wide">OBSOLETA</span>' : ''}
                        </div>
                    </div>
                    <div class="w-full sm:w-48 mt-1 sm:mt-0">
                        <span class="inline-block bg-slate-900 border border-slate-700 text-slate-400 text-xs px-2.5 py-1 rounded font-medium">${branch.originFileName}</span>
                    </div>
                    <div class="w-full sm:w-48 mt-1 sm:mt-0 text-xs text-slate-400">
                        ${fecha}
                    </div>
                    <div class="mt-2 sm:mt-0 text-right">
                        <a href="https://www.figma.com/file/${branch.key}" target="_blank" class="inline-flex items-center text-xs font-medium bg-slate-700 hover:bg-orange-600 text-white px-3 py-1.5 rounded transition shadow-sm">
                            Abrir Rama
                        </a>
                    </div>
                `;
                container.appendChild(row);
            });
        }
    </script>
</body>
</html>
